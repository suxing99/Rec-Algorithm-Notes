# OneTrans LTV30 训练配置（修改本文件后直接运行 run_onetrans.py）

data:
  # 本地开发：单文件/目录
  # train_path: examples/OneTrans/data/train_data.parquet
  # val_path: examples/OneTrans/data/val_data.parquet

  # 服务器按天分区（与 train_path/val_path 二选一，配置后优先使用）
  data_root: /data4/notebooks/zhuangzhengjie/tj3387_ltv/data

  # 训练集
  train_end_date: 20260523   # 训练截止日期 (YYYYMMDD)
  train_days: 40             # 向前取 N 天 → .../20260523/rank/train/ + .../20260522/rank/train/
  train_subdir: rank/train  # 可选，默认 rank/train

  # 验证集
  val_end_date: 20260524    # 验证截止日期 (YYYYMMDD)
  val_days: 1               # 向前取 N 天 → .../20260524/rank/val/
  val_subdir: rank/train      # 可选，默认 rank/val

model:
  embed_dim: 16   # 默认 embedding 维度（未在 embed_dims 中单独配置的字段使用此值）
  embed_dims:   # 按字段覆盖维度（channel_game 与 game_id 共享，仅配置 game_id）
    # 单值类别 (NS_CAT_FIELDS)
    model: 16
    channel: 16
    version: 8
    network: 4
    platform: 4
    # channel_game 与 game_id 共享 embedding，维度见下方 game_id
    page_num: 4
    hour: 4
    week: 4
    is_coin_stock: 4
    top_scene: 8
    moduleid: 4
    scene: 8
    open_server: 4
    welfare: 4
    is_free_id: 4
    free_money_id: 4
    discount_id: 4
    moneys_all_bucket: 4
    # 多值类别 (NS_MULTI_CAT_FIELDS)
    kind_id: 8
    tag_id: 8
    top2_tag_id: 8
    welfare_tag_id: 8
    feature_tag_id: 8
    # 候选 / 序列（channel_game 复用 game_id embedding）
    game_id: 64
    recharge_type: 8
    seq_type: 4
  d_model: 32
  num_heads: 4
  num_layers: 4
  ns_num_tokens: 8
  max_seq_len: 30
  ffn_ratio: 4.0
  dropout: 0.1
  min_s_keep: 4
  target_log1p: true
  lr: 0.001

train:
  batch_size: 8192
  max_epochs: 20
  num_workers: 16

trainer:
  log_every_n_steps: 100
  early_stop_patience: 3

logging:
  save_dir: lightning_logs
  name: onetrans
