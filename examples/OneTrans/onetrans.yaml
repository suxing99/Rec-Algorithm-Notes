# OneTrans LTV30 训练配置（修改本文件后直接运行 run_onetrans.py）

data:
  # 本地开发：单文件/目录
  # train_path: examples/OneTrans/data/train_data.parquet
  # val_path: examples/OneTrans/data/val_data.parquet

  # 服务器按天分区（与 train_path/val_path 二选一，配置后优先使用）
  data_root: /data4/notebooks/zhuangzhengjie/tj3387_ltv/data

  # 训练集
  train_end_date: 20260523   # 训练截止日期 (YYYYMMDD)
  train_days: 40             # 向前取 N 天 → .../20260523/rank/train/ + .../20260522/rank/train/
  train_subdir: rank/train  # 可选，默认 rank/train

  # 验证集
  val_end_date: 20260524    # 验证截止日期 (YYYYMMDD)
  val_days: 1               # 向前取 N 天 → .../20260524/rank/val/
  val_subdir: rank/train      # 可选，默认 rank/val

model:
  embed_dim: 16
  d_model: 32
  num_heads: 4
  num_layers: 4
  ns_num_tokens: 8
  max_seq_len: 30
  ffn_ratio: 4.0
  dropout: 0.1
  min_s_keep: 4
  target_log1p: true
  lr: 0.001

train:
  batch_size: 8192
  max_epochs: 20
  num_workers: 16

trainer:
  log_every_n_steps: 100
  early_stop_patience: 3

logging:
  save_dir: lightning_logs
  name: onetrans
