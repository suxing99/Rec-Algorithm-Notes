# 双塔召回训练配置（修改本文件后直接运行 run_two_tower.py）

data:
  train_dir: examples/TwoTowerRecall/data
  val_dir: examples/TwoTowerRecall/data

model:
  embed_dim: 128
  output_dim: 128
  max_seq_len: 50
  lr: 0.001

train:
  batch_size: 32
  max_epochs: 20
  num_workers: 16
  preprocess_num_proc: 16  # 留空或 null 则与 num_workers 相同

trainer:
  log_every_n_steps: 10
  early_stop_patience: 3

logging:
  save_dir: lightning_logs
  name: two_tower
